<title>Metal Price</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--surface:#111;--surface2:#181818;--border:#222;--border2:#2e2e2e;
  --text:#F2F2F2;--muted:#888;--faint:#555;
  --gold:#C9922A;--gold-light:#E8B84B;--silver:#BCBCBC;--plat:#8AABBD;--plat-dim:#8AABBD33;
  --mono:'Roboto Mono',monospace;--sans:'DM Sans',system-ui;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
.wrap{max-width:440px;margin:0 auto;padding:0 0 40px}
.header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0}
.logo-icon img{width:34px;height:34px;object-fit:cover;border-radius:9px;display:block}
.logo-text{font-size:17px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px;font-family:var(--mono);letter-spacing:.5px}
.refresh-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;color:var(--gold);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.refresh-btn:active{background:var(--surface2)}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:rot .6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.section{padding:18px 20px;border-bottom:1px solid var(--border)}
.label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-family:var(--mono)}
.trm-row{display:flex;align-items:center;gap:10px}
.trm-main{flex:1}
.trm-value-wrap{display:flex;align-items:baseline;gap:6px}
.trm-prefix{font-size:12px;color:var(--muted);font-family:var(--mono)}
.trm-input{background:none;border:none;border-bottom:1.5px solid transparent;color:var(--gold-light);font-family:var(--mono);font-size:28px;font-weight:700;width:170px;padding:0;outline:none;letter-spacing:-1px}
.trm-input:focus{border-bottom-color:var(--gold)}
.trm-hint{font-size:10px;color:var(--faint);margin-top:3px;font-family:var(--mono)}
.trm-links{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.link-pill{padding:5px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--gold);font-size:10px;font-weight:600;text-decoration:none;font-family:var(--mono);letter-spacing:.5px;white-space:nowrap}
.link-pill.blue{color:#60A5FA}
.metal-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.metal-tab{padding:12px 6px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all .15s}
.metal-tab-icon{font-size:20px;margin-bottom:4px}
.metal-tab-name{font-size:11px;font-weight:600;letter-spacing:.3px}
.metal-tab-price{font-size:9px;font-family:var(--mono);margin-top:3px;opacity:.7}
.metal-tab.act-gold{background:#1A1100;border-color:var(--gold);color:var(--gold-light)}
.metal-tab.act-silver{background:#161616;border-color:var(--silver);color:var(--silver)}
.metal-tab.act-plat{background:#0D141A;border-color:var(--plat);color:var(--plat)}
.price-block{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:16px 18px}
.price-row{display:flex;justify-content:space-between;align-items:flex-end}
.price-col .price-tag{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.price-col .price-val{font-size:22px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
.price-col .price-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.price-divider{width:1px;background:var(--border);height:44px;margin-bottom:4px}
.change-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:var(--mono);margin-top:4px}
.up{background:#3ECF8E18;color:#3ECF8E}
.dn{background:#F8717118;color:#F87171}
.ley-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-family:var(--mono);font-weight:700;background:var(--plat-dim);color:var(--plat);border:1px solid var(--plat);margin-top:4px;letter-spacing:1px}
.pct-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:12px 16px}
.pct-label{flex:1;font-size:12px;color:var(--muted)}
.pct-controls{display:flex;align-items:center;gap:8px}
.pct-btn{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.pct-btn:active{background:var(--faint)}
.pct-input{background:none;border:none;width:58px;text-align:center;font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold-light);outline:none;padding:0}
.pct-sym{font-family:var(--mono);font-size:16px;color:var(--muted)}
.gr-wrap{position:relative;background:var(--surface);border:1.5px solid var(--border2);border-radius:12px;overflow:hidden;transition:border-color .15s}
.gr-wrap:focus-within{border-color:var(--gold)}
.gr-input{width:100%;background:none;border:none;padding:18px 60px 18px 20px;color:var(--text);font-family:var(--mono);font-size:32px;font-weight:700;letter-spacing:-1px;outline:none}
.gr-input::placeholder{color:var(--faint)}
.gr-unit{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:14px;color:var(--muted)}
.result-block{background:var(--surface);border:1px solid var(--border2);border-radius:16px;overflow:hidden}
.result-top{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.result-top-label{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
.result-formula{font-size:9px;color:var(--faint);font-family:var(--mono);text-align:right}
.result-main{padding:18px 18px 20px;text-align:center}
.result-tag{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.result-cop{font-family:var(--mono);font-size:40px;font-weight:700;letter-spacing:-2px;line-height:1}
.result-usd{font-family:var(--mono);font-size:14px;color:var(--muted);margin-top:8px}
.result-empty{padding:30px;text-align:center;color:var(--faint);font-size:12px;font-family:var(--mono)}
.footer{text-align:center;padding-top:20px;font-size:10px;color:var(--faint);font-family:var(--mono)}
</style>

  h+='<div style="text-align:right;flex-shrink:0">';
  h+='<div style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">COP/USD</div>';
  h+='<input class="trm-input" type="number" value="'+S.trm+'" oninput="S.trm=+this.value;updateResult()" onchange="S.trm=+this.value;render()" style="text-align:right;width:130px"/>';
  h+='<div style="font-size:10px;color:var(--faint);font-family:var(--mono);margin-top:2px">Editable'+(S.lastUpdate?' · '+S.lastUpdate:'')+'</div>';
  h+='<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;margin-top:6px">';
  h+='<a class="link-pill" href="https://pbit.bancodebogota.com/Indicadores/Indicadores.aspx" target="_blank">BCO BOGOTÁ →</a>';
  h+='<a class="link-pill blue" href="https://totoro.banrep.gov.co/estadisticas-economicas/" target="_blank">BANREP →</a>';
  h+='</div></div></div></div>';

  // METALES
  h+='<div class="section"><div class="label">Metal</div><div class="metal-tabs">';
  ["gold","silver","platinum"].forEach(function(mk){
    var mm=S.metals[mk],gpp=grPrice(mm),isAct=S.metal===mk;
    h+='<div class="metal-tab'+(isAct?" "+metalActClass(mk):"")+'" data-mk="'+mk+'" onclick="selectMetal(this.dataset.mk)">'+
       '<div class="metal-tab-icon">'+mm.icon+'</div>'+
       '<div class="metal-tab-name">'+mm.name+'</div>'+
       '<div class="metal-tab-price">'+(gpp>0?fmtGR(gpp)+" USD":"---")+'</div></div>';
  });
  h+='</div></div>';

  // CALCULADORA LEY
  h+='<div class="section">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleLey()">';
  h+='<div class="label" style="margin-bottom:0">Calculadora de ley</div>';
  h+='<div style="font-family:var(--mono);font-size:12px;color:var(--muted);padding:4px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px">'+(S.showLey?"CERRAR ↑":"ABRIR ↓")+'</div>';
  h+='</div>';
  if(S.showLey){
    h+='<div style="margin-top:14px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
    h+='<div><div style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">PESO BRUTO</div>';
    h+='<div class="gr-wrap" style="border-radius:10px"><input class="gr-input" type="number" step="0.001" placeholder="0.000" style="font-size:22px;padding:13px 44px 13px 14px" value="'+(S.leyBruto||"")+'" oninput="S.leyBruto=this.value;calcLey()" onchange="S.leyBruto=this.value;calcLey()"/><span class="gr-unit" style="font-size:12px">gr</span></div></div>';
    h+='<div><div style="font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">LEY / PUREZA</div>';
    h+='<div class="gr-wrap" style="border-radius:10px"><input class="gr-input" type="number" step="0.01" min="0" max="1000" placeholder="0.00" style="font-size:22px;padding:13px 30px 13px 14px" value="'+(S.leyPct||"")+'" oninput="S.leyPct=this.value;calcLey()" onchange="S.leyPct=this.value;calcLey()"/><span class="gr-unit" style="font-size:12px">‰</span></div></div>';
    h+='</div></div>';
  }
  h+='</div>';
  // GRAMOS
  h+='<div class="section"><div class="label">Gramos a calcular</div>';
  h+='<div class="gr-wrap"><input class="gr-input" type="number" step="0.001" placeholder="0.000" id="gr-inp" value="'+(S.grams||"")+'" oninput="S.grams=this.value;updateResult()" onchange="S.grams=this.value;updateResult()"/><span class="gr-unit">gr</span></div></div>';
  // RESULTADO + % inline
  h+='<div class="section" style="border:none">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h+='<div class="label" style="margin-bottom:0">Pagable</div>';
  // % pagable inline
  h+='<div style="display:flex;align-items:center;gap:6px">';
  h+='<div class="pct-btn" onclick="adjPct(-1)">−</div>';
  h+='<input class="pct-input" type="number" min="1" max="200" value="'+m.pct+'" oninput="S.metals[S.metal].pct=+this.value;updateResult()" onchange="S.metals[S.metal].pct=+this.value;render()" style="width:52px"/>';
  h+='<span class="pct-sym">%</span>';
  h+='<div class="pct-btn" onclick="adjPct(1)">+</div>';
  h+='</div></div>';
  h+='<div id="result-area">'+buildResult()+'</div></div>';
  if(S.lastUpdate)h+='<div class="footer">Actualización: '+S.lastUpdate+' · Auto cada 5 min</div>';
  return h;
}

function buildResult(){
  var m=S.metals[S.metal], gp=grPrice(m), col=metalColor(S.metal), gr=getGrams();
  var gpEf=S.metal==="platinum"?gp*LEY_PLATINO:gp;
  var pagUSD=gr*gpEf*(m.pct/100), pagCOP=pagUSD*S.trm;
  var h='<div class="result-block">';
  if(gr>0&&gp>0){
    var grFmt=parseFloat(S.grams||"1").toLocaleString("es-CO",{minimumFractionDigits:1,maximumFractionDigits:1});
    var formula=grFmt+" gr × "+fmtGR(gpEf)+(S.metal==="platinum"?" (L840)":"")+" × "+S.trm.toLocaleString("es-CO")+" × "+m.pct+"%";
    h+='<div class="result-top"><div class="result-top-label">CÁLCULO</div><div class="result-formula">'+formula+'</div></div>';
    h+='<div class="result-main"><div class="result-tag">TOTAL PAGABLE</div>';
    h+='<div class="result-cop" style="color:'+col+'">'+fmtCOP(pagCOP)+'</div>';
    h+='<div class="result-usd">'+fmtUSD(pagUSD)+'</div></div>';
  }else{h+='<div class="result-empty">Ingresa los gramos →</div>';}
  h+='</div>';
  return h;
}

function toggleLey(){if(S.showLey)closeLey();else{S.showLey=true;render();}}
function closeLey(){
  S.showLey=false;S.leyBruto="";S.leyPct="";S.grams="1";
  clearTimeout(_leyTimer);_leyTimer=null;
  var el=document.getElementById("gr-inp");if(el)el.value="1";
  render();
}
function selectMetal(mk){
  if(S.metal===mk)return;
  S.metal=mk;S.grams="1";S.showLey=false;S.leyBruto="";S.leyPct="";
  clearTimeout(_leyTimer);_leyTimer=null;render();
}
function calcLey(){
  var bruto=parseFloat(S.leyBruto)||0, leyV=parseFloat(S.leyPct)||0;
  if(bruto>0&&leyV>0){
    S.grams=(bruto*(leyV/1000)).toFixed(1);
    clearTimeout(_leyTimer);
    _leyTimer=setTimeout(function(){S.leyBruto="";S.leyPct="";S.grams="1";S.showLey=false;_leyTimer=null;render();},60000);
  }else{S.grams="1";}
  var el=document.getElementById("gr-inp");if(el)el.value=S.grams;
  updateResult();
}
function adjPct(d){
  var m=S.metals[S.metal];
  m.pct=Math.round((Math.min(200,Math.max(1,m.pct+(d*0.5))))*10)/10;
  render();
}
function fetchTRM(){
  function tryDate(date,retries){
    var yy=date.getFullYear(),mm=String(date.getMonth()+1).padStart(2,"0"),dd=String(date.getDate()).padStart(2,"0");
    var f=yy+"-"+mm+"-"+dd+"T00:00:00.000";
    return fetch("https://www.datos.gov.co/resource/32sa-8pi3.json?vigenciadesde="+f)
      .then(function(r){return r.json();})
      .then(function(d){
        var v=d&&d[0]&&d[0].valor?parseFloat(d[0].valor):null;
        if(v&&v>2000&&v<8000){S.trm=Math.round(v);}
        else if(retries>0){var p=new Date(date);p.setDate(p.getDate()-1);return tryDate(p,retries-1);}
      });
  }
  return tryDate(new Date(),5).catch(function(){
    return fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json")
      .then(function(r){return r.json();})
      .then(function(d){var v=d&&d.usd&&d.usd.cop?Math.round(d.usd.cop):null;if(v&&v>2000&&v<8000)S.trm=v;})
      .catch(function(){});
  });
}
function fetchMetal(sym,key){
  return fetch("https://api.gold-api.com/price/"+sym)
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.price&&d.price>0){S.metals[key].prev=S.metals[key].oz||d.price;S.metals[key].oz=parseFloat(d.price);}})
    .catch(function(){});
}
function fetchMetals(){
  return fetch("https://data-asg.goldprice.org/dbXRates/USD")
    .then(function(r){return r.json();})
    .then(function(d){
      var it=d&&d.items&&d.items[0];
      if(it){
        if(it.xauPrice&&it.xauPrice>100){S.metals.gold.prev=S.metals.gold.oz||it.xauPrice;S.metals.gold.oz=parseFloat(it.xauPrice);}
        if(it.xagPrice&&it.xagPrice>0.5){S.metals.silver.prev=S.metals.silver.oz||it.xagPrice;S.metals.silver.oz=parseFloat(it.xagPrice);}
        if(it.xptPrice&&it.xptPrice>100){S.metals.platinum.prev=S.metals.platinum.oz||it.xptPrice;S.metals.platinum.oz=parseFloat(it.xptPrice);}
      }
      var tasks=[];
      if(!S.metals.gold.oz)tasks.push(fetchMetal("XAU","gold"));
      if(!S.metals.silver.oz)tasks.push(fetchMetal("XAG","silver"));
      if(!S.metals.platinum.oz)tasks.push(fetchMetal("XPT","platinum"));
      return tasks.length?Promise.all(tasks):Promise.resolve();
    })
    .catch(function(){return Promise.all([fetchMetal("XAU","gold"),fetchMetal("XAG","silver"),fetchMetal("XPT","platinum")]);}); 
}
function fetchAll(){
  S.loading=true;render();
  Promise.all([fetchMetals(),fetchTRM()])
    .then(function(){S.loading=false;S.lastUpdate=ts();render();})
    .catch(function(){S.loading=false;render();});
}
if('serviceWorker' in navigator){
  var swCode='const CACHE="mp-v1";self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>{const u=e.request.url;if(u.includes("goldprice")||u.includes("gold-api")||u.includes("datos.gov")||u.includes("jsdelivr"))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});';
  var blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
}
render();fetchAll();setInterval(fetchAll,300000);
</script>
</body>
</html>
